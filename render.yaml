# Render Blueprint — optional one-click deploy
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: wellness-tracker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.3"
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://wellness-tracker-web.onrender.com
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

  # Frontend (static site)
  - type: web
    name: wellness-tracker-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://wellness-tracker-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
